<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambola Factory - Custom Ticket Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --panel-bg: linear-gradient(180deg, #1a0938, #2d1357); --border-color: rgba(255, 255, 255, 0.1); --text-main: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #110c26; color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        .control-panel { width: 380px; background: var(--panel-bg); border-right: 1px solid var(--border-color); padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .brand-banner { background: linear-gradient(135deg, #7c3aed, #ec4899); border-radius: 12px; padding: 16px; text-align: center; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; }
        .color-pickers { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .color-field { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; background: rgba(0,0,0,0.1); }
        .btn-action { background: linear-gradient(90deg, #9333ea, #ec4899); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .preview-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .festive-canvas-bg { flex: 1; overflow-y: auto; padding: 30px; display: flex; justify-content: center; background: #241442; }
        #pdf-content { width: 210mm; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .page { width: 210mm; height: 296mm; padding: 4mm 6mm; position: relative; }
        .tickets-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(6, 1fr); gap: 6px 20px; height: 100%; }
        
        .ticket-box { border-radius: 8px; padding: 5px; display: flex; flex-direction: column; justify-content: center; border: 2px solid #000; }
        .ticket-header { display: flex; justify-content: space-between; font-size: 8.5pt; font-weight: bold; margin-bottom: 4px; }
        .tambola-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .tambola-table td { height: 33px; text-align: center; font-size: 14pt; font-weight: 800; border: 1px solid #000; }
        
        .ticket-footer-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; padding: 0 4px; }
        .ticket-footer-label { flex: 1; text-align: center; font-size: 7.5pt; font-weight: bold; text-transform: uppercase; }
        .ticket-watermark-label { font-size: 5.5pt; font-weight: bold; opacity: 0.5; }

        .premium-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; }
        .premium-modal.active { display: flex; }
        .modal-card { background: white; color: #1e1b4b; padding: 30px; border-radius: 16px; width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div class="premium-modal" id="paywall-modal">
        <div class="modal-card">
            <h3>👑 Unlock Premium Access</h3>
            <p style="margin-bottom:15px;">Upgrade to unlock 100 pages & remove watermarks!</p>
            <div style="margin:10px 0; font-size:1.2rem; font-weight:bold; color:#db2777;">Price: ₹99</div>
            <input type="text" id="coupon-field" placeholder="Enter Code (TAMB24)" style="width:100%; padding:10px; margin-bottom:10px;">
            <button id="btn-apply-coupon" style="padding:10px 20px;">Apply Coupon</button>
            <p style="margin:15px 0; font-size: 0.9rem;">Pay UPI: <b>athulpachu2004-1@okaxis</b><br>
            <a href="https://wa.me/918281260024?text=Hi%20Athul,%20I%20have%20paid%20for%20the%20Tambola%20Premium%20Pass." style="display:block; background:#25d366; color:white; padding:10px; margin-top:10px; text-decoration:none; border-radius:5px; font-weight:bold;">📲 Send Screenshot on WhatsApp</a></p>
            <input type="text" id="premium-key-input" placeholder="Enter Key" style="width:100%; padding:10px;">
            <button id="btn-activate-premium" style="width:100%; padding:10px; margin-top:10px;">Activate</button>
            <button id="btn-close-modal" style="width:100%; padding:10px; margin-top:10px; background:#64748b; color:white; border:none; border-radius:5px;">Cancel</button>
        </div>
    </div>

    <div class="control-panel">
        <div class="brand-banner"><h1>🎰 TAMBOLA FACTORY</h1></div>
        <div id="status-badge" style="font-weight:bold;">⭐ Free Version</div>
        <div class="form-group"><label>Company Name</label><input type="text" id="input-company" value="Your Company Name"></div>
        <div class="form-group"><label>Match / Event Name</label><input type="text" id="input-seed-string" value="Sunday Premium Match"></div>
        <div class="color-pickers">
            <div class="color-field"><input type="color" id="color-cell-bg" value="#ffffff"><label>Ticket BG</label></div>
            <div class="color-field"><input type="color" id="color-font" value="#000000"><label>Numbers</label></div>
        </div>
        <button class="btn-action" id="btn-refresh">Update Live Preview 🪄</button>
    </div>

    <div class="preview-screen">
        <button id="btn-download" style="padding:15px; background:#db2777; color:white; border:none; cursor:pointer;">📥 Download High-Res PDF</button>
        <div class="festive-canvas-bg"><div id="pdf-content"></div></div>
    </div>

    <script>
        // --- CORE MATH ENGINE ---
        let m_w, m_z;
        function seedFromString(str) { let hash = 0; for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash); m_w = (123456789 + hash) & 0xffffffff; m_z = (987654321 - hash) & 0xffffffff; }
        function getNextRandom() { m_z = (36969 * (m_z & 65535) + (m_z >> 16)) & 0xffffffff; m_w = (18000 * (m_w & 65535) + (m_w >> 16)) & 0xffffffff; return (((m_z << 16) + m_w) & 0xffffffff) / 4294967296 + 0.5; }
        function seededShuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(getNextRandom() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } }

        function generateStrictSetOf6() {
            while (true) {
                let pools = [Array.from({length:9},(_,i)=>i+1), Array.from({length:10},(_,i)=>i+10), Array.from({length:10},(_,i)=>i+20), Array.from({length:10},(_,i)=>i+30), Array.from({length:10},(_,i)=>i+40), Array.from({length:10},(_,i)=>i+50), Array.from({length:10},(_,i)=>i+60), Array.from({length:10},(_,i)=>i+70), Array.from({length:11},(_,i)=>i+80)];
                pools.forEach(p => seededShuffle(p));
                let tickets = Array.from({length:6},()=>Array.from({length:3},()=>Array(9).fill(0)));
                let counts = Array.from({length:6},()=>Array(9).fill(1));
                if (true) {
                    for(let t=0; t<6; t++) {
                        for(let c=0; c<9; c++) {
                            let rows = [0,1,2]; seededShuffle(rows);
                            for(let r=0; r<counts[t][c]; r++) tickets[t][rows[r]][c] = pools[c].shift();
                        }
                    }
                    return tickets;
                }
            }
        }

        // --- CORE UI LOGIC ---
        function startGeneration() {
            const canvas = document.getElementById('pdf-content');
            const company = document.getElementById('input-company').value;
            const seed = document.getElementById('input-seed-string').value;
            seedFromString(seed);
            canvas.innerHTML = '';
            const pageDiv = document.createElement('div'); pageDiv.className = 'page';
            const grid = document.createElement('div'); grid.className = 'tickets-grid';
            
            for(let i=0; i<12; i++) {
                let ticket = generateStrictSetOf6()[0]; 
                let t = document.createElement('div'); t.className = 'ticket-box';
                t.innerHTML = `<div class="ticket-header"><span>${company}</span><span>A000${i+1}</span></div>
                               <table class="tambola-table">${ticket.map(r => `<tr>${r.map(n => `<td style="background:${document.getElementById('color-cell-bg').value}; color:${document.getElementById('color-font').value}">${n||''}</td>`).join('')}</tr>`).join('')}</table>
                               <div class="ticket-footer-row"><span class="ticket-watermark-label">FACTORY TICKET</span><span class="ticket-footer-label">${seed}</span></div>`;
                grid.appendChild(t);
            }
            pageDiv.appendChild(grid); canvas.appendChild(pageDiv);
        }

        document.addEventListener('DOMContentLoaded', startGeneration);
        document.getElementById('btn-refresh').addEventListener('click', startGeneration);
        document.getElementById('btn-download').addEventListener('click', () => document.getElementById('paywall-modal').classList.add('active'));
        document.getElementById('btn-close-modal').addEventListener('click', () => document.getElementById('paywall-modal').classList.remove('active'));
        
        document.getElementById('btn-apply-coupon').addEventListener('click', () => { 
            if(document.getElementById('coupon-field').value.toUpperCase() === "TAMB24") alert("Coupon Applied: 10% Discount!"); 
        });
    </script>
</body>
</html>
